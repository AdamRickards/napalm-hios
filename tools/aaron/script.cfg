# AARON — Automated Asset Recognition On Network
#
# Connects to HiOS switches, gathers MAC tables + LLDP, cross-references
# MACs across all devices, and classifies every port as uplink/edge/indirect/empty.
#
# Ports with more learned MACs than edge_threshold that aren't seen on other
# devices are still classified as edge (multi-MAC devices like VM hosts).

username = admin
password = private
protocol = mops
edge_threshold = 3
hide_empty = true
hide_uplinks = false

# ARP scan: resolve edge device MACs to IPs (optional, off by default)
#   passive                — read existing OS ARP cache only, no traffic generated
#   192.168.1.0/24         — active: tickle subnet with UDP, then read cache
#   192.168.1.0/24, 10.0.0.0/24  — active: multiple subnets
# arp_scan = passive
# arp_scan = 192.168.1.0/24

# Output file and format controlled via CLI args:
#   -o filename    output file (default: aaron_output.csv)
#   -j             output JSON instead of CSV (default: aaron_output.json)

# Devices — one IP per line
192.168.1.4
192.168.1.10
192.168.1.117
192.168.1.127
192.168.1.128
192.168.1.239
192.168.1.254
