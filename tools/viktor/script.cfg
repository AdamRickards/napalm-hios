# VIKTOR — VLAN Intent, Knowledgeable Topology-Optimized Rules
#
# Fleet-wide VLAN provisioning for Hirschmann HiOS switches.
# Connects to devices in parallel, manages VLANs/port membership,
# audits consistency, auto-trunks inter-switch links via LLDP,
# and sets per-port QoS (PCP) on VLAN member ports.
#
# All settings below can be overridden by CLI args.
# CLI args always win over config file values.

username = admin
password = private

# Protocol — mops (default), snmp, or ssh
# MOPS is preferred: atomic writes, same as web UI, staging support.
# CLI: --protocol snmp
protocol = mops

# Ring selector — filter fleet to MRP ring members by VLAN ID
# Only devices with this VLAN in their egress table are included.
# Ports tagged for this VLAN = ring ports (inter-switch links).
# CLI: -m 100
# ring = 100

# Save to NVM after changes — persists config across reboots
# Without this, changes live in RAM only (power cycle rolls back).
# Ignored for read-only operations (--audit, --export, vlan list).
# CLI: --save
# save = true

# Debug — verbose protocol logging to logfile + console
# Shows MOPS XML, SNMP walks, SSH commands.
# CLI: --debug
# debug = true

# Devices — one IP per line
# CLI alternatives: -d <ip> (single), --ips <spec> (range/CIDR)
#
# --ips formats:
#   --ips 192.168.1.80,192.168.1.85       comma list
#   --ips 192.168.1.80-85                  last-octet range
#   --ips 192.168.1.0/24                   CIDR

# Lab BRS50s (management on VLAN 60 NM-MGMT)
192.168.60.80
192.168.60.81
192.168.60.82
192.168.60.85
