# CLAMPS configuration
#
# Global credentials — used for all devices
username admin
password private

# Default ring ports — used when a device line doesn't specify ports
# Format: slot/port (e.g. 1/5)
port1 1/5
port2 1/6

# VLAN for MRP frames (0-4042)
vlan 100

# MRP recovery delay — max time to recover from a ring break
# Values: 200ms, 500ms, 30ms, 10ms
recovery_delay 200ms

# Save config after successful ring verification?
# If true, configs are saved to NVM only after the ring manager
# reports the ring is healthy (closed). If false (or omitted),
# configs remain in RAM only — a power cycle rolls back all changes.
save false

# Protocol — mops (default), snmp, or ssh
# MOPS is preferred (atomic writes, same as web UI).
# Use snmp or ssh if HTTPS (port 443) is not reachable.
protocol mops

# Edge protection strategy — how to protect edge ports from loops
#
#   rstp-full  (default, recommended)
#              RSTP stays on globally, ring ports RSTP off.
#              BPDU Guard on globally, admin edge on all edge ports.
#              Auto-disable for bpdu-rate with timer on all ports.
#              Catches cross-ring loops via BPDUs. Works on ALL SW levels.
#
#   loop       Loop protection on all ports.
#              Edge ports: active mode (send + evaluate keepalives).
#              Ring ports: passive mode (evaluate cross-ring loops).
#              RSTP disabled globally. Default timer=0 (kill and stay dead).
#              Requires L2A or higher (abort on L2S unless force true).
#
#   rstp       Legacy — disable RSTP per ring port only.
#              Minimal protection. Blind to loops that traverse the ring.
#
# CLI override: --edge rstp-full|loop|rstp
edge_protection rstp-full

# Auto-disable recovery timer in seconds (used by loop and rstp-full)
# 0 = no auto-recovery (port stays down until manual intervention)
# 30+ = seconds until auto-recovery after loop/BPDU detection
# Default if omitted: loop=0 (kill and stay dead), rstp-full=30 (BPDU Guard catches instantly)
# auto_disable_timer 30

# Force advanced edge protection despite L2S devices
# When edge_protection is loop or rstp-full and L2S devices are detected:
#   false = abort with error (default — safe)
#   true  = proceed, skip L2S devices with warning (partial protection)
# No CLI flag — must be set in config deliberately
force false

# Debug mode — log MOPS XML request/response detail
# debug true

# ---------------------------------------------------------------
# Device list
#
# One device per line. Format:
#   <ip>                     — client, uses global ports
#   <ip> RM                  — ring manager, uses global ports
#   <ip> 1/3 1/4             — client, custom ports
#   <ip> 1/3 1/4 RM          — ring manager, custom ports
#
# If no device has RM, the FIRST device is automatically assigned
# as ring manager. Only one device should be RM — the tool warns
# if it sees more than one.
#
# Order matters: devices are configured in the order listed.
# ---------------------------------------------------------------
192.168.1.80 1/5 1/6 RM
192.168.1.81
192.168.1.82
