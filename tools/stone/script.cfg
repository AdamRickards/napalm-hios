# STONE — SFP Transceiver Optics Network Evaluator
#
# Connects to HiOS switches, reads SFP transceiver optical power levels,
# and exports an Excel report with quality scores and outlier detection.

username = admin
password = private
protocol = mops

# Output file, retries, and timeout controlled via CLI args:
#   -o filename    output file (default: network_data.xlsx)
#   -r 3           retries per device (default: 3)
#   --delay 5      delay between retries in seconds (default: 5)
#   -t 30          connection timeout in seconds (default: 30)

# Devices — one IP per line
192.168.1.254
